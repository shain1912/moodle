<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KODE LMS · 관리자</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="dot"></span> KODE LMS · 관리자</div>
    <div class="who">
      <span id="who-name"></span>
      <a class="btn sm ghost" href="/student.html" target="_blank">학생 화면 보기 ↗</a>
      <button class="btn sm ghost" id="btn-logout">로그아웃</button>
    </div>
  </div>

  <div class="container">
    <div class="tabs" style="max-width:520px">
      <button id="tab-dash" class="active">📊 진도 대시보드</button>
      <button id="tab-lec">🎬 강의 관리</button>
      <button id="tab-stu">👥 학생 명단</button>
    </div>

    <!-- ───── 진도 대시보드 ───── -->
    <section id="panel-dash">
      <div class="row between" style="margin:18px 0">
        <div>
          <h1 class="h1">진도 현황</h1>
          <p class="sub" id="dash-sub" style="margin:0">불러오는 중…</p>
        </div>
        <div class="row">
          <button class="btn ghost sm" id="btn-refresh-dash">새로고침</button>
          <a class="btn primary" id="btn-csv" href="/api/admin/report.csv">⬇ 진도 CSV 다운로드</a>
        </div>
      </div>
      <div class="table-scroll">
        <table id="dash-table">
          <thead><tr id="dash-head"></tr></thead>
          <tbody id="dash-body"></tbody>
        </table>
      </div>
      <p class="small muted" style="margin-top:10px">셀의 숫자는 시청 진도율(%), <span class="pill o">O</span> 는 완료 인정입니다.</p>
    </section>

    <!-- ───── 강의 관리 ───── -->
    <section id="panel-lec" class="hidden">
      <div class="grid cols-2" style="grid-template-columns:1fr 1.3fr;margin-top:18px">
        <div class="card">
          <div class="section-title">🎬 강의 영상 업로드</div>
          <label>강의 제목</label>
          <input type="text" id="up-title" placeholder="예: 1주차 - 오리엔테이션" />
          <label>설명 (선택)</label>
          <textarea id="up-desc" placeholder="강의 설명"></textarea>
          <label>영상 파일</label>
          <input type="file" id="up-file" accept="video/*" />
          <div id="up-fileinfo" class="small muted" style="margin-top:6px"></div>
          <button class="btn primary block" id="btn-upload" style="margin-top:16px">업로드</button>
          <div class="progress-line hidden" id="up-progress"><span></span></div>
          <div id="up-msg" class="msg"></div>
          <p class="small muted" style="margin-top:8px">
            ※ 웹 업로드가 안 되면 R2 버킷 CORS(PUT 허용) 설정을 확인하세요. 파일당 최대 5GB.
          </p>
        </div>
        <div class="card">
          <div class="section-title">📚 등록된 강의 <span class="muted small" id="lec-count"></span></div>
          <div class="lecture-list" id="lec-list"></div>
          <p id="lec-empty" class="muted hidden" style="text-align:center;padding:30px">아직 등록된 강의가 없습니다.</p>
        </div>
      </div>
    </section>

    <!-- ───── 학생 명단 ───── -->
    <section id="panel-stu" class="hidden">
      <div class="grid cols-2" style="grid-template-columns:1fr 1.4fr;margin-top:18px">
        <div>
          <div class="card">
            <div class="section-title">➕ 학생 1명 추가</div>
            <label>이름</label>
            <input type="text" id="stu-name" placeholder="홍길동" />
            <label>팀 (선택)</label>
            <input type="text" id="stu-team" placeholder="예: 두더지" />
            <label>PIN (선택 · 설정 시 로그인에 필요)</label>
            <input type="text" id="stu-pin" placeholder="예: 1234 (비우면 이름만으로 로그인)" />
            <button class="btn primary block" id="btn-add-stu" style="margin-top:16px">추가 / 수정</button>
            <div id="stu-msg" class="msg"></div>
          </div>
          <div class="card" style="margin-top:16px">
            <div class="section-title">📋 명단 일괄 등록</div>
            <p class="small muted" style="margin-top:0">한 줄에 한 명씩. 형식: <b>이름</b> 또는 <b>이름,팀</b></p>
            <textarea id="bulk-text" placeholder="홍길동,두더지&#10;김철수,유니온 AI&#10;이영희"></textarea>
            <button class="btn block" id="btn-bulk" style="margin-top:12px">일괄 등록</button>
            <div id="bulk-msg" class="msg"></div>
          </div>
        </div>
        <div class="card">
          <div class="row between">
            <div class="section-title" style="margin:0">👥 학생 명단 <span class="muted small" id="stu-count"></span></div>
            <button class="btn ghost sm" id="btn-refresh-stu">새로고침</button>
          </div>
          <div class="table-scroll" style="margin-top:12px">
            <table>
              <thead><tr><th>팀</th><th>이름</th><th class="num">PIN</th><th class="num">상태</th><th></th></tr></thead>
              <tbody id="stu-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
