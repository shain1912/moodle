<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KODE LMS · 로그인</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="center-wrap">
    <div class="card" style="width:100%;max-width:420px">
      <div class="row" style="gap:10px;margin-bottom:6px">
        <span style="width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#ff4d8b,#b8a4ed)"></span>
        <span style="font-weight:700;font-size:19px;letter-spacing:-.03em;color:#0a0a0a">KODE LMS</span>
      </div>
      <p class="sub">온라인 강의 · 진도체크 시스템</p>

      <div class="tabs">
        <button id="tab-student" class="active">학생 로그인</button>
        <button id="tab-teacher">관리자</button>
      </div>

      <!-- 학생 -->
      <form id="form-student">
        <label>이름</label>
        <input type="text" id="s-name" autocomplete="off" placeholder="명단에 등록된 본인 이름" />
        <div id="pin-wrap" class="hidden">
          <label>PIN (관리자가 설정한 경우)</label>
          <input type="password" id="s-pin" autocomplete="off" placeholder="숫자 PIN" />
        </div>
        <button class="btn primary block" type="submit" style="margin-top:16px">로그인</button>
        <div id="msg-student" class="msg"></div>
        <p class="small muted" style="margin-top:6px">참가 명단에 등록된 이름으로 로그인하세요.</p>
      </form>

      <!-- 관리자 -->
      <form id="form-teacher" class="hidden">
        <label>아이디</label>
        <input type="text" id="t-user" autocomplete="username" placeholder="관리자 아이디" />
        <label>비밀번호</label>
        <input type="password" id="t-pass" autocomplete="current-password" />
        <button class="btn primary block" type="submit" style="margin-top:16px">관리자 로그인</button>
        <div id="msg-teacher" class="msg"></div>
      </form>
    </div>
  </div>
  <script type="module" src="/js/login.js"></script>
</body>
</html>
